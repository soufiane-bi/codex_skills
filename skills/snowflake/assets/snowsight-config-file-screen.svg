<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Snowsight account details config file guide</title>
  <desc id="desc">Illustration showing the Account Details dialog with the Config File tab selected and a generated Snowflake connection block.</desc>
  <rect width="920" height="560" fill="#f6f8fb"/>
  <rect x="56" y="48" width="808" height="464" rx="18" fill="#ffffff" stroke="#cfd7e6" stroke-width="2"/>
  <rect x="56" y="48" width="808" height="64" rx="18" fill="#eef4ff"/>
  <text x="88" y="88" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#182235">Account Details</text>
  <circle cx="824" cy="80" r="15" fill="#d9e2f2"/>
  <path d="M818 74 L830 86 M830 74 L818 86" stroke="#516070" stroke-width="2" stroke-linecap="round"/>

  <rect x="88" y="140" width="180" height="316" rx="12" fill="#f4f7fb" stroke="#d7deea"/>
  <text x="112" y="176" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#465366">Account</text>
  <rect x="112" y="196" width="132" height="34" rx="8" fill="#ffffff" stroke="#ced8e6"/>
  <text x="128" y="218" font-family="Arial, sans-serif" font-size="13" fill="#556475">View account details</text>
  <path d="M278 214 H350" stroke="#376fd6" stroke-width="3" stroke-linecap="round"/>
  <path d="M340 205 L350 214 L340 223" fill="none" stroke="#376fd6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="328" y="140" width="500" height="316" rx="12" fill="#ffffff" stroke="#d7deea"/>
  <text x="356" y="176" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2a3d">Account Details</text>
  <rect x="356" y="198" width="88" height="36" rx="8" fill="#f7f9fc" stroke="#dce3ef"/>
  <text x="379" y="221" font-family="Arial, sans-serif" font-size="13" fill="#5d6978">General</text>
  <rect x="452" y="198" width="104" height="36" rx="8" fill="#dfeaff" stroke="#85a9f8"/>
  <text x="475" y="221" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f57c8">Config File</text>
  <rect x="564" y="198" width="142" height="36" rx="8" fill="#f7f9fc" stroke="#dce3ef"/>
  <text x="586" y="221" font-family="Arial, sans-serif" font-size="13" fill="#5d6978">Connectors</text>

  <rect x="356" y="256" width="424" height="146" rx="10" fill="#172033"/>
  <text x="380" y="286" font-family="Menlo, Consolas, monospace" font-size="14" fill="#b8c7ff">[connections.my_connection]</text>
  <text x="380" y="312" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e6edf7">account = "orgname-account"</text>
  <text x="380" y="338" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e6edf7">user = "YOUR_USERNAME"</text>
  <text x="380" y="364" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e6edf7">warehouse = "COMPUTE_WH"</text>
  <text x="380" y="390" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e6edf7">database = "DEMO_DWH"</text>

  <rect x="604" y="416" width="176" height="36" rx="8" fill="#2463eb"/>
  <text x="654" y="439" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Copy</text>
  <path d="M318 426 H594" stroke="#376fd6" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8"/>
  <path d="M584 417 L594 426 L584 435" fill="none" stroke="#376fd6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="88" y="490" font-family="Arial, sans-serif" font-size="15" fill="#475569">Paste the copied config block into the setup wizard.</text>
</svg>
